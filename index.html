<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធបង្កើតកាតសិស្ស ៦នាក់ - សាលាបឋមសិក្សាកំពង់ល្ពៅ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Khmer&family=Moul&display=swap');
        body { font-family: 'Khmer', sans-serif; }
        .khmer-moul { font-family: 'Moul', serif; }
        
        /* កំណត់ទំហំក្រដាស A4 ពេលបោះពុម្ព */
        @page {
            size: A4 portrait;
            margin: 8mm;
        }
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .print-page { 
                display: grid !important; 
                grid-template-columns: repeat(2, 1fr) !important; /* ២ ជួរឈរ */
                gap: 15px !important;
                width: 100% !important;
                box-shadow: none !important;
                padding: 0 !important;
            }
            .card-item {
                box-shadow: none !important;
                border: 1px solid #cbd5e1 !important;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 no-print">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-4 mb-4 gap-4">
                <div>
                    <h2 class="text-xl font-bold text-amber-600 flex items-center gap-2">
                        🏫 ប្រព័ន្ធគ្រប់គ្រង និងរចនាកាតសិស្សស្តង់ដា (ម្តង ៦ កាត)
                    </h2>
                    <p class="text-xs text-slate-400 mt-1">សូមចុចរើសយក "កាតទី" នីមួយៗដើម្បីបញ្ចូលឈ្មោះសិស្សទៅតាមកាតនីមួយៗ</p>
                </div>
                <button onclick="window.print()" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-6 rounded-xl transition flex items-center justify-center gap-2 shadow-md">
                    🖨️ បោះពុម្ព ឬរក្សាទុកជា PDF (A4)
                </button>
            </div>

            <div class="flex flex-wrap gap-2 mb-6 bg-slate-50 p-2 rounded-xl border border-slate-200">
                <button onclick="selectCard(1)" id="btnCard1" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-amber-500 text-white shadow">កាតទី ១</button>
                <button onclick="selectCard(2)" id="btnCard2" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ២</button>
                <button onclick="selectCard(3)" id="btnCard3" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៣</button>
                <button onclick="selectCard(4)" id="btnCard4" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៤</button>
                <button onclick="selectCard(5)" id="btnCard5" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៥</button>
                <button onclick="selectCard(6)" id="btnCard6" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៦</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ឈ្មោះសិស្ស (ភាសាខ្មែរ)</label>
                    <input type="text" id="inputNameKh" oninput="updateData()" placeholder="ឧ. សុខ ណារី" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ឈ្មោះសិស្ស (ឡាតាំង)</label>
                    <input type="text" id="inputNameEn" oninput="updateData()" placeholder="ឧ. SOK NARY" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 uppercase bg-slate-50">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">ភេទ</label>
                        <select id="inputGender" onchange="updateData()" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 bg-slate-50">
                            <option value="ប្រុស">ប្រុស</option>
                            <option value="ស្រី">ស្រី</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">ថ្នាក់ទី</label>
                        <input type="text" id="inputClass" oninput="updateData()" placeholder="ឧ. 4A" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 bg-slate-50">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">អត្តលេខសិស្ស (ID)</label>
                    <input type="text" id="inputID" oninput="updateData()" placeholder="ឧ. KLP-001" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 bg-slate-50">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-1">ជ្រើសរើសរូបថតសិស្ស</label>
                    <input type="file" id="inputPhoto" onchange="updatePhoto(this)" accept="image/*" class="w-full p-1.5 border border-slate-300 rounded-lg bg-slate-50 text-xs">
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-300 max-w-[840px] mx-auto">
            <p class="text-center text-xs text-slate-400 mb-4 no-print">--- ទម្រង់មើលមុនពេលបោះពុម្ពលើក្រដាស A4 (Preview 3ជួរ x 2ជួរ) ---</p>
            
            <div id="printPageContainer" class="print-page grid grid-cols-1 sm:grid-cols-2 gap-4 justify-items-center">
                </div>
        </div>

    </div>

    <script>
        // បង្កើត Object ផ្ទុកទិន្នន័យកាតទាំង ៦ លំនាំដើម
        let currentCardIndex = 1;
        const defaultPhoto = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%23cbd5e1' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";
        
        let cardsData = {};
        for(let i=1; i<=6; i++) {
            cardsData[i] = {
                nameKh: `សិស្សទី ${i}`,
                nameEn: `STUDENT NAME 0${i}`,
                gender: "ប្រុស",
                studentClass: "4A",
                idNumber: `KLP-2026-00${i}`,
                photo: defaultPhoto
            };
        }

        // បង្ហាញកាតសិស្សទាំងអស់ពេលបើកកម្មវិធីដំបូង
        window.onload = function() {
            renderAllCards();
            loadFormData();
        };

        // អនុគមន៍ប្តូរការជ្រើសរើសកាត (កាតទី១,២...៦)
        function selectCard(index) {
            currentCardIndex = index;
            
            // ដូរពណ៌ប៊ូតុងសកម្ម
            for(let i=1; i<=6; i++) {
                const btn = document.getElementById(`btnCard${i}`);
                if(i === index) {
                    btn.className = "flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-amber-500 text-white shadow";
                } else {
                    btn.className = "flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200";
                }
            }
            loadFormData();
        }

        // ចាក់ទិន្នន័យចូល Form ពេលប្តូរកាត
        function loadFormData() {
            const data = cardsData[currentCardIndex];
            document.getElementById('inputNameKh').value = data.nameKh.includes("សិស្សទី") ? "" : data.nameKh;
            document.getElementById('inputNameEn').value = data.nameEn.includes("STUDENT") ? "" : data.nameEn;
            document.getElementById('inputGender').value = data.gender;
            document.getElementById('inputClass').value = data.studentClass;
            document.getElementById('inputID').value = data.idNumber;
            document.getElementById('inputPhoto').value = ""; // clear file input
        }

        // ធ្វើបច្ចុប្បន្នភាពទិន្នន័យពេលវាយអក្សរក្នុង Form
        function updateData() {
            const index = currentCardIndex;
            cardsData[index].nameKh = document.getElementById('inputNameKh').value || `សិស្សទី ${index}`;
            cardsData[index].nameEn = document.getElementById('inputNameEn').value.toUpperCase() || `STUDENT NAME 0${index}`;
            cardsData[index].gender = document.getElementById('inputGender').value;
            cardsData[index].studentClass = document.getElementById('inputClass').value || "-";
            cardsData[index].idNumber = document.getElementById('inputID').value || `KLP-00${index}`;
            
            renderAllCards();
        }

        // ធ្វើបច្ចុប្បន្នភាពរូបថតសិស្ស
        function updatePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    cardsData[currentCardIndex].photo = e.target.result;
                    renderAllCards();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // អនុគមន៍បង្កើត និងបង្ហាញកាតទាំង ៦ ទៅលើអេក្រង់
        function renderAllCards() {
            const container = document.getElementById('printPageContainer');
            container.innerHTML = '';

            for(let i=1; i<=6; i++) {
                const st = cardsData[i];
                const cardHtml = `
                    <div class="card-item w-[370px] h-[230px] bg-white rounded-xl shadow-md overflow-hidden border border-slate-200 relative flex flex-col justify-between text-left">
                        <div class="bg-gradient-to-r from-amber-500 via-orange-500 to-amber-600 text-white p-2.5 px-4 flex justify-between items-center border-b border-orange-400">
                            <div>
                                <h3 class="khmer-moul text-[11px] leading-tight tracking-wide">សាលាបឋមសិក្សាកំពង់ល្ពៅ</h3>
                                <p class="text-[8px] uppercase font-bold text-amber-100 tracking-widest mt-0.5">Student Identity Card</p>
                            </div>
                            <span class="text-[9px] bg-white/20 px-2 py-0.5 rounded-full font-bold no-print">កាតទី ${i}</span>
                        </div>

                        <div class="flex-1 flex p-3 gap-3 items-center bg-gradient-to-br from-white to-amber-50/20">
                            <div class="flex flex-col items-center gap-1.5">
                                <div class="w-[85px] h-[110px] bg-slate-50 border-2 border-amber-200 rounded-lg overflow-hidden shadow-inner flex items-center justify-center">
                                    <img src="${st.photo}" class="w-full h-full object-cover">
                                </div>
                                <div class="text-center">
                                    <p class="text-[7px] text-slate-400 uppercase font-semibold">អត្តលេខ / ID</p>
                                    <p class="text-[11px] font-black text-orange-600 tracking-wide">${st.idNumber}</p>
                                </div>
                            </div>

                            <div class="flex-1 h-full flex flex-col justify-center border-l border-slate-100 pl-3 space-y-1.5">
                                <div>
                                    <h2 class="text-base font-black text-slate-800 leading-tight">${st.nameKh}</h2>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">${st.nameEn}</p>
                                </div>
                                <div class="space-y-1 text-[12px] text-slate-600 pt-1 border-t border-slate-100">
                                    <div class="flex"><span class="w-16 font-medium text-slate-400">ភេទ / Sex:</span><span class="font-bold text-slate-700">${st.gender}</span></div>
                                    <div class="flex"><span class="w-16 font-medium text-slate-400">ថ្នាក់ / Class:</span><span class="font-bold text-slate-700">${st.studentClass}</span></div>
                                    <div class="flex"><span class="w-16 font-medium text-slate-400">ឆ្នាំសិក្សា:</span><span class="font-bold text-slate-700">2025-2026</span></div>
                                </div>
                            </div>
                        </div>

                        <div class="bg-slate-50 border-t border-slate-100 p-2 px-4 flex justify-between items-center">
                            <div class="text-[8px] text-slate-400 flex items-center gap-1">
                                <span>🎯 វិរិយភាព វិន័យ សីលធម៌ គុណភាព</span>
                            </div>
                            <div id="qr-node-${i}" class="bg-white p-0.5 border border-slate-200 rounded shadow-sm"></div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            }

            // ហៅបណ្ណាល័យបង្កើត QR Code ដាក់ចូលកាតនីមួយៗ
            for(let i=1; i<=6; i++) {
                new QRCode(document.getElementById(`qr-node-${i}`), {
                    text: cardsData[i].idNumber,
                    width: 32,
                    height: 32,
                    colorDark : "#d97706",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }
        }
    </script>
</body>
</html>
