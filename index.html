<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធបង្កើតកាតសិស្ស - សាលាបឋមសិក្សាកំពង់ល្ពៅ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @font-face {
            font-family: 'Moul';
            src: url('https://fonts.gstatic.com/s/moul/v27/7cHpv4V0gN0e_mE_Z9g6wIs.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Khmer';
            src: url('https://fonts.gstatic.com/s/khmer/v25/977MGA66tTM_6f_Fidp_XFf7.woff2') format('woff2');
        }

        body { 
            font-family: 'Khmer', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .khmer-moul { font-family: 'Moul', serif !important; }
        
        .print-page { 
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 4mm !important; 
            width: 260mm !important; 
            margin: 0 auto !important;
            padding: 4mm !important;
            box-sizing: border-box !important;
            background: white !important;
            page-break-inside: avoid !important;
        }
        
        .card-item {
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
            border: 0.5px solid #a1b5cc !important; 
            display: flex !important;
            flex-direction: column !important;
            justify-content: space-between !important;
            width: 7.10cm !important;  
            height: 9.20cm !important; 
            background: white !important;
            border-radius: 6px;
            overflow: hidden;
            box-sizing: border-box !important;
            page-break-inside: avoid !important;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-center border-b pb-5 mb-5 gap-4">
                <div class="flex items-center gap-4 text-center md:text-left flex-col md:flex-row w-full md:w-auto">
                    <div class="w-16 h-16 bg-gradient-to-tr from-blue-700 to-amber-500 rounded-full flex items-center justify-center shadow-md text-white text-2xl font-bold border-2 border-white ring-4 ring-blue-50">
                        🏫
                    </div>
                    <div>
                        <h2 class="khmer-moul text-xl text-blue-800 tracking-wide leading-snug">
                            ប្រព័ន្ធបង្កើតកាតសិស្សសាលាបឋមសិក្សាកំពង់ល្ពៅ
                        </h2>
                    </div>
                </div>
                <button onclick="downloadPDFFile()" class="w-full md:w-auto bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition flex items-center justify-center gap-2 shadow-lg text-sm tracking-wide">
                    📥 ទាញយក PDF
                </button>
            </div>

            <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-blue-900 mb-1">👤 ឈ្មោះគ្រូបន្ទុកថ្នាក់</label>
                    <input type="text" id="inputTeacherName" oninput="updateData()" placeholder="ឧ. សេង សុភាន់" class="w-full p-2.5 border border-blue-200 rounded-lg outline-none focus:border-blue-500 bg-white text-sm shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-blue-900 mb-1">📅 ថ្ងៃ ខែ ឆ្នាំ ខ្មែរ</label>
                    <input type="text" id="inputKhmerDate" oninput="updateData()" placeholder="ឧ. ថ្ងៃចន្ទ ទី២៥ ខែឧសភា ឆ្នាំ២០២៦" class="w-full p-2.5 border border-blue-200 rounded-lg outline-none focus:border-blue-500 bg-white text-sm shadow-sm">
                </div>
            </div>

            <div class="flex flex-wrap gap-2 mb-6 bg-slate-50 p-2 rounded-xl border border-slate-200">
                <button onclick="selectCard(1)" id="btnCard1" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-blue-600 text-white shadow">កាតទី ១</button>
                <button onclick="selectCard(2)" id="btnCard2" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ២</button>
                <button onclick="selectCard(3)" id="btnCard3" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៣</button>
                <button onclick="selectCard(4)" id="btnCard4" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៤</button>
                <button onclick="selectCard(5)" id="btnCard5" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៥</button>
                <button onclick="selectCard(6)" id="btnCard6" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៦</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ឈ្មោះសិស្ស (ខ្មែរ)</label>
                    <input type="text" id="inputNameKh" oninput="updateData()" placeholder="ឧ. កេះ លីណា" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-blue-500 bg-slate-50 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">ភេទ</label>
                        <select id="inputGender" onchange="updateData()" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-blue-500 bg-slate-50 text-sm">
                            <option value="ប្រុស">ប្រុស</option>
                            <option value="ស្រី">ស្រី</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">ថ្នាក់ទី</label>
                        <input type="text" id="inputClass" oninput="updateData()" placeholder="ឧ. ៤(ក)" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-blue-500 bg-slate-50 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">អត្តលេខសិស្ស (ID)</label>
                    <input type="text" id="inputID" oninput="updateData()" placeholder="ឧ. KLP-2026-577" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-blue-500 bg-slate-50 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ថ្ងៃខែឆ្នាំកំណើត</label>
                    <input type="text" id="inputDob" oninput="updateData()" placeholder="ឧ. ១៥/០២/២០១៥" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-blue-500 bg-slate-50 text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-1">ទីកន្លែងបច្ចុប្បន្ន</label>
                    <input type="text" id="inputAddress" oninput="updateData()" placeholder="ឧ. ភូមិកំពង់ល្ពៅ" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-blue-500 bg-slate-50 text-sm">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-500 mb-1">រូបថតសិស្ស</label>
                    <input type="file" id="inputPhoto" onchange="updatePhoto(this)" accept="image/*" class="w-full p-1.5 border border-slate-300 rounded-lg bg-slate-50 text-xs">
                </div>
            </div>
        </div>

        <div class="bg-white p-2 rounded-2xl shadow-xl border border-slate-300 max-w-[1000px] mx-auto overflow-x-auto">
            <div id="printPageContainer" class="print-page bg-white"></div>
        </div>

    </div>

    <script>
        let currentCardIndex = 1;
        let teacherName = "";
        let khmerDate = "";
        const defaultPhoto = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%23cbd5e1' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";
        
        // មូលហេតុមិនចេញឡូហ្គោគឺដោយសារការទាញយករូបភាពពីក្រៅជាប់ CORS (Security block) របស់ Browser ពេលបំលែងជា PDF។
        // ដំណោះស្រាយ គឺការប្រើប្រាស់រូបភាពឡូហ្គោក្រសួងអប់រំជាលក្ខណៈ Pure Inline SVG (Vector) នៅក្នុងកូដផ្ទាល់តែម្តង ដែលធានាថាបង្ហាញច្បាស់ ១០០% គ្រប់ទីកន្លែង ទោះគ្មានអ៊ីនធឺណិតក៏ដោយ។
        const svgMoeysLogo = `<svg viewBox="0 0 100 100" class="w-[24px] h-[24px] flex-shrink-0" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#eab308" stroke-width="2"/>
            <circle cx="50" cy="50" r="44" fill="#1e3a8a"/>
            <circle cx="50" cy="50" r="41" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,1"/>
            <!-- Outer decorative rays representing knowledge rings -->
            <circle cx="50" cy="50" r="38" fill="none" stroke="#eab308" stroke-width="0.75"/>
            <!-- Core Central Element: Representing the Sacred Hamsa / Chuor (Sacred Bird/Lotus Emblem of MOEYS) -->
            <g id="emblem-core" fill="#eab308">
                <!-- Base / Pedestal (Lotus seat) -->
                <path d="M25,72 Q50,82 75,72 Q65,65 50,65 Q35,65 25,72 Z" fill="#eab308"/>
                <path d="M30,65 Q50,70 70,65 Q60,60 50,60 Q40,60 30,65 Z" fill="#ffffff" opacity="0.8"/>
                <!-- Central Pillar / Candle Flame / Sacred Spire -->
                <path d="M47,60 L53,60 L54,35 Q50,22 46,35 Z"/>
                <!-- Glowing Aura Flame Behind Spire -->
                <path d="M50,16 Q57,28 53,45 Q47,45 44,28 Z" fill="#f59e0b" opacity="0.9"/>
                <!-- Left Wing / Elaborate Scrollwork -->
                <path d="M46,40 Q26,30 22,50 Q28,62 45,55 Q32,50 35,42 Q42,42 46,46 Z"/>
                <!-- Right Wing / Elaborate Scrollwork -->
                <path d="M54,40 Q74,30 78,50 Q72,62 55,55 Q68,50 65,42 Q58,42 54,46 Z"/>
                <!-- Inner small details for traditional Khmer ornament look -->
                <circle cx="50" cy="30" r="2.5" fill="#ffffff"/>
                <circle cx="50" cy="42" r="2" fill="#ffffff"/>
                <circle cx="36" cy="48" r="1.5" fill="#ffffff"/>
                <circle cx="64" cy="48" r="1.5" fill="#ffffff"/>
                <!-- Lower banner scroll arches -->
                <path d="M33,73 Q50,78 67,73" stroke="#ffffff" stroke-width="1" fill="none"/>
            </g>
        </svg>`;

        let cardsData = {};
        for(let i=1; i<=6; i++) {
            cardsData[i] = {
                nameKh: `សិស្សទី ${i}`,
                gender: "ប្រុស",
                studentClass: "៤(ក)",
                idNumber: `KLP-2026-00${i}`,
                dob: "xx/xx/xxxx",
                address: "ភូមិកំពង់ល្ពៅ",
                photo: defaultPhoto
            };
        }

        window.onload = function() {
            renderAllCards();
            loadFormData();
        };

        function selectCard(index) {
            currentCardIndex = index;
            for(let i=1; i<=6; i++) {
                const btn = document.getElementById(`btnCard${i}`);
                if(i === index) {
                    btn.className = "flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-blue-600 text-white shadow";
                } else {
                    btn.className = "flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200";
                }
            }
            loadFormData();
        }

        function loadFormData() {
            const data = cardsData[currentCardIndex];
            document.getElementById('inputNameKh').value = data.nameKh.includes("សិស្សទី") ? "" : data.nameKh;
            document.getElementById('inputGender').value = data.gender;
            document.getElementById('inputClass').value = data.studentClass;
            document.getElementById('inputID').value = data.idNumber;
            document.getElementById('inputDob').value = data.dob.includes("xx/xx") ? "" : data.dob;
            document.getElementById('inputAddress').value = data.address.includes("ភូមិកំពង់") ? "" : data.address;
            document.getElementById('inputPhoto').value = "";
        }

        function updateData() {
            teacherName = document.getElementById('inputTeacherName').value || "....................................";
            khmerDate = document.getElementById('inputKhmerDate').value || "...........ខែ...........ឆ្នាំ............";
            const index = currentCardIndex;
            cardsData[index].nameKh = document.getElementById('inputNameKh').value || `សិស្សទី ${index}`;
            cardsData[index].gender = document.getElementById('inputGender').value;
            cardsData[index].studentClass = document.getElementById('inputClass').value || "-";
            cardsData[index].idNumber = document.getElementById('inputID').value || `KLP-00${index}`;
            cardsData[index].dob = document.getElementById('inputDob').value || "xx/xx/xxxx";
            cardsData[index].address = document.getElementById('inputAddress').value || "-";
            
            renderAllCards();
        }

        function updatePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    cardsData[currentCardIndex].photo = e.target.result;
                    renderAllCards();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderAllCards() {
            const container = document.getElementById('printPageContainer');
            container.innerHTML = '';
            const displayTeacher = teacherName || "....................................";
            
            let displayDate = "";
            if(document.getElementById('inputKhmerDate').value) {
                displayDate = "ធ្វើនៅកំពង់ល្ពៅ, ថ្ងៃ" + document.getElementById('inputKhmerDate').value;
            } else {
                displayDate = "ធ្វើនៅកំពង់ល្ពៅ, ថ្ងៃ.......ខែ.......ឆ្នាំ.......";
            }

            for(let i=1; i<=6; i++) {
                const st = cardsData[i];
                const cardHtml = `
                    <div class="card-item">
                        
                        <div class="bg-[#1e3a8a] text-white pt-1 pb-0.5 px-2 flex flex-col items-center justify-center border-b-2 border-[#d97706] h-[38px] text-center w-full">
                            <div class="flex items-center justify-center gap-1.5 w-full">
                                ${svgMoeysLogo}
                                <div class="khmer-moul text-[9.5px] leading-none tracking-wide" style="font-family: 'Moul', serif !important;">សាលាបឋមសិក្សាកំពង់ល្ពៅ</div>
                            </div>
                            <p class="text-[5.5px] uppercase font-bold text-amber-300 tracking-wider leading-none mt-0.5 text-center w-full">Student Identity Card</p>
                        </div>

                        <div class="flex-1 flex flex-col items-center pt-1.5 px-3 bg-white">
                            <div class="w-[68px] h-[80px] bg-slate-50 border border-blue-100 rounded overflow-hidden shadow-sm mb-1 flex items-center justify-center">
                                <img src="${st.photo}" class="w-full h-full object-cover">
                            </div>

                            <div class="khmer-moul text-[11px] text-blue-900 leading-tight mb-1 text-center w-full truncate" style="font-family: 'Moul', serif !important;">${st.nameKh}</div>

                            <div class="w-full text-left space-y-0.5 text-[9px] text-slate-600 border-t border-slate-100 pt-1">
                                <div class="flex"><span class="w-[58px] text-slate-400 font-medium">ភេទ / Sex:</span><span class="font-bold text-slate-700">${st.gender}</span></div>
                                <div class="flex"><span class="w-[58px] text-slate-400 font-medium">ថ្នាក់ / Class:</span><span class="font-bold text-slate-700">${st.studentClass}</span></div>
                                <div class="flex"><span class="w-[58px] text-slate-400 font-medium">អត្តលេខ / ID:</span><span class="font-bold text-amber-600">${st.idNumber}</span></div>
                                <div class="flex"><span class="w-[58px] text-slate-400 font-medium">ថ្ងៃខែឆ្នាំកំ.:</span><span class="font-bold text-slate-700">${st.dob}</span></div>
                                <div class="flex"><span class="w-[58px] text-slate-400 font-medium">ទីកន្លែងបច្ចុ.:</span><span class="font-bold text-slate-700 truncate">${st.address}</span></div>
                            </div>
                        </div>

                        <div class="bg-slate-50 border-t border-slate-100 p-1 px-2 flex justify-between items-center h-[58px]">
                            <div class="flex flex-col items-center justify-center w-[40px]">
                                <div id="qr-node-${i}" class="bg-white p-0.5 border border-slate-200 rounded shadow-sm"></div>
                                <p class="text-[5px] text-slate-400 font-bold mt-0.5 text-center whitespace-nowrap">ឆ្នាំសិក្សា ២០២៥-២០២៦</p>
                            </div>
                            
                            <div class="w-[155px] flex flex-col justify-between h-[50px] text-right">
                                <div class="text-[6.5px] font-bold text-slate-500 leading-none block text-center truncate">
                                    ${displayDate}
                                </div>
                                <div class="text-[7.5px] font-bold text-blue-800 leading-none text-center block my-0.5">
                                    គ្រូបន្ទុកថ្នាក់
                                </div>
                                <div class="h-[10px]"></div> 
                                <div class="text-[8px] font-bold text-slate-700 text-center border-t border-dashed border-slate-300 pt-0.5 block truncate uppercase">
                                    ${displayTeacher}
                                </div>
                            </div>
                        </div>

                    </div>
                `;
                container.innerHTML += cardHtml;
            }

            for(let i=1; i<=6; i++) {
                document.getElementById(`qr-node-${i}`).innerHTML = '';
                new QRCode(document.getElementById(`qr-node-${i}`), {
                    text: cardsData[i].idNumber,
                    width: 24,
                    height: 24,
                    colorDark : "#1e3a8a", 
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
            }
        }

        function downloadPDFFile() {
            const element = document.getElementById('printPageContainer');
            
            const btn = document.querySelector('button[onclick="downloadPDFFile()"]');
            btn.innerHTML = "⏳ កំពុងទាញយក...";
            btn.disabled = true;

            const opt = {
                margin:       [4, 4, 4, 4], 
                filename:     'កាតសិស្ស_សាលាកំពង់ល្ពៅ.pdf',
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { 
                    scale: 4, 
                    useCORS: true, 
                    letterRendering: false,
                    scrollX: 0,
                    scrollY: 0
                }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerHTML = "📥 ទាញយក PDF";
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                btn.innerHTML = "📥 ទាញយក PDF";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
