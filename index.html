<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធបង្កើតកាតសិស្ស - សាលាបឋមសិក្សាកំពង់ល្ពៅ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Khmer&family=Moul&display=swap');

        body { 
            font-family: 'Khmer', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .khmer-moul { 
            font-family: 'Moul', serif !important; 
            letter-spacing: 0.5px;
        }
        
        .print-page { 
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 6mm !important; 
            width: 270mm !important; 
            margin: 0 auto !important;
            padding: 6mm !important;
            box-sizing: border-box !important;
            background: #ffffff !important;
            page-break-inside: avoid !important;
        }
        
        .card-item {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border: 1px solid #cbd5e1 !important; 
            display: flex !important;
            flex-direction: column !important;
            justify-content: space-between !important;
            width: 7.10cm !important;  
            height: 9.20cm !important; 
            background: #ffffff !important;
            border-radius: 10px;
            overflow: hidden;
            box-sizing: border-box !important;
            page-break-inside: avoid !important;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-6 md:p-10 text-slate-800">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="bg-white p-8 rounded-2xl border border-slate-200/80 shadow-sm">
            <div class="flex flex-col md:flex-row justify-between items-center border-b border-slate-100 pb-6 mb-6 gap-4">
                <div class="flex items-center gap-4 flex-col md:flex-row w-full md:w-auto text-center md:text-left">
                    <div class="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center text-white text-2xl shadow-md shadow-blue-100">
                        🏫
                    </div>
                    <div>
                        <h2 class="khmer-moul text-lg text-slate-900 leading-snug">
                            ប្រព័ន្ធបង្កើតកាតសិស្ស
                        </h2>
                        <p class="text-sm text-slate-400 mt-1">សាលាបឋមសិក្សាកំពង់ល្ពៅ</p>
                    </div>
                </div>
                <button onclick="downloadPDFFile()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg shadow-blue-100 flex items-center justify-center gap-2">
                    📥 ទាញយកជា PDF
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8 bg-slate-50 p-5 rounded-xl border border-slate-100">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">ឈ្មោះគ្រូបន្ទុកថ្នាក់</label>
                    <input type="text" id="inputTeacherName" oninput="updateData()" placeholder="ឧ. សេង សុភាន់" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">ថ្ងៃ ខែ ឆ្នាំ ចេញកាត</label>
                    <input type="text" id="inputKhmerDate" oninput="updateData()" placeholder="ឧ. ថ្ងៃចន្ទ ទី២៥ ខែឧសភា ឆ្នាំ២០២៦" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all text-sm">
                </div>
            </div>

            <div class="flex flex-wrap gap-2 mb-6 border-b border-slate-100 pb-6">
                <button onclick="selectCard(1)" id="btnCard1" class="py-2.5 px-5 rounded-xl font-bold text-xs transition-all bg-blue-600 text-white shadow-md shadow-blue-100">កាតទី ១</button>
                <button onclick="selectCard(2)" id="btnCard2" class="py-2.5 px-5 rounded-xl font-bold text-xs transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">កាតទី ២</button>
                <button onclick="selectCard(3)" id="btnCard3" class="py-2.5 px-5 rounded-xl font-bold text-xs transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">កាតទី ៣</button>
                <button onclick="selectCard(4)" id="btnCard4" class="py-2.5 px-5 rounded-xl font-bold text-xs transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">កាតទី ៤</button>
                <button onclick="selectCard(5)" id="btnCard5" class="py-2.5 px-5 rounded-xl font-bold text-xs transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">កាតទី ៥</button>
                <button onclick="selectCard(6)" id="btnCard6" class="py-2.5 px-5 rounded-xl font-bold text-xs transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">កាតទី ៦</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1.5">ឈ្មោះសិស្ស</label>
                    <input type="text" id="inputNameKh" oninput="updateData()" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 bg-slate-50/50 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1.5">ភេទ</label>
                        <select id="inputGender" onchange="updateData()" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 bg-slate-50/50 text-sm">
                            <option value="ប្រុស">ប្រុស</option>
                            <option value="ស្រី">ស្រី</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1.5">ថ្នាក់ទី</label>
                        <input type="text" id="inputClass" oninput="updateData()" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 bg-slate-50/50 text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1.5">អត្តលេខ (ID)</label>
                    <input type="text" id="inputID" oninput="updateData()" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 bg-slate-50/50 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1.5">ថ្ងៃខែឆ្នាំកំណើត</label>
                    <input type="text" id="inputDob" oninput="updateData()" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 bg-slate-50/50 text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-400 mb-1.5">ទីកន្លែងបច្ចុប្បន្ន</label>
                    <input type="text" id="inputAddress" oninput="updateData()" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 bg-slate-50/50 text-sm">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-400 mb-1.5">រូបថតសិស្ស</label>
                    <input type="file" id="inputPhoto" onchange="updatePhoto(this)" accept="image/*" class="w-full p-2 border border-slate-200 rounded-xl bg-slate-50/50 text-xs file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 max-w-[1100px] mx-auto overflow-x-auto">
            <div id="printPageContainer" class="print-page bg-white"></div>
        </div>

    </div>

    <script>
        let currentCardIndex = 1;
        let teacherName = "";
        let khmerDate = "";
        const defaultPhoto = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%23e2e8f0' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";
        
        // ឡូហ្គោក្រសួងអប់រំ បែប Vector SVG ច្បាស់ស្អាតមិនបែករូបភាព
        const moeysLogoSVG = `<svg viewBox="0 0 100 100" class="w-[30px] h-[30px] flex-shrink-0" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#eab308" stroke-width="1.5"/>
            <circle cx="50" cy="50" r="44" fill="#1e3a8a"/>
            <g fill="#eab308">
                <path d="M25,72 Q50,82 75,72 Q65,65 50,65 Q35,65 25,72 Z"/>
                <path d="M47,60 L53,60 L54,35 Q50,22 46,35 Z"/>
                <path d="M50,16 Q57,28 53,45 Q47,45 44,28 Z" fill="#f59e0b"/>
                <path d="M46,40 Q26,30 22,50 Q28,62 45,55 Q32,50 35,42 Q42,42 46,46 Z"/>
                <path d="M54,40 Q74,30 78,50 Q72,62 55,55 Q68,50 65,42 Q58,42 54,46 Z"/>
            </g>
        </svg>`;

        let cardsData = {};
        for(let i=1; i<=6; i++) {
            cardsData[i] = {
                nameKh: `សិស្សទី ${i}`,
                gender: "ប្រុស",
                studentClass: "៤(ក)",
                idNumber: `KLP-2026-00${i}`,
                dob: "xx/xx/xxxx",
                address: "ភូមិកំពង់ល្ពៅ",
                photo: defaultPhoto
            };
        }

        window.onload = function() {
            renderAllCards();
            loadFormData();
        };

        function selectCard(index) {
            currentCardIndex = index;
            for(let i=1; i<=6; i++) {
                const btn = document.getElementById(`btnCard${i}`);
                if(i === index) {
                    btn.className = "py-2.5 px-5 rounded-xl font-bold text-xs transition-all bg-blue-600 text-white shadow-md shadow-blue-100";
                } else {
                    btn.className = "py-2.5 px-5 rounded-xl font-bold text-xs transition-all bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
            }
            loadFormData();
        }

        function loadFormData() {
            const data = cardsData[currentCardIndex];
            document.getElementById('inputNameKh').value = data.nameKh.includes("សិស្សទី") ? "" : data.nameKh;
            document.getElementById('inputGender').value = data.gender;
            document.getElementById('inputClass').value = data.studentClass;
            document.getElementById('inputID').value = data.idNumber;
            document.getElementById('inputDob').value = data.dob.includes("xx/xx") ? "" : data.dob;
            document.getElementById('inputAddress').value = data.address.includes("ភូមិកំពង់") ? "" : data.address;
            document.getElementById('inputPhoto').value = "";
        }

        function updateData() {
            teacherName = document.getElementById('inputTeacherName').value || "....................................";
            khmerDate = document.getElementById('inputKhmerDate').value || "...........ខែ...........ឆ្នាំ............";
            const index = currentCardIndex;
            cardsData[index].nameKh = document.getElementById('inputNameKh').value || `សិស្សទី ${index}`;
            cardsData[index].gender = document.getElementById('inputGender').value;
            cardsData[index].studentClass = document.getElementById('inputClass').value || "-";
            cardsData[index].idNumber = document.getElementById('inputID').value || `KLP-00${index}`;
            cardsData[index].dob = document.getElementById('inputDob').value || "xx/xx/xxxx";
            cardsData[index].address = document.getElementById('inputAddress').value || "-";
            
            renderAllCards();
        }

        function updatePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    cardsData[currentCardIndex].photo = e.target.result;
                    renderAllCards();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderAllCards() {
            const container = document.getElementById('printPageContainer');
            container.innerHTML = '';
            
            let displayDate = "";
            if(document.getElementById('inputKhmerDate').value) {
                displayDate = "ថ្ងៃ" + document.getElementById('inputKhmerDate').value;
            } else {
                displayDate = "ថ្ងៃ.......ខែ.......ឆ្នាំ.......";
            }

            for(let i=1; i<=6; i++) {
                const st = cardsData[i];
                const cardHtml = `
                    <div class="card-item">
                        
                        <div class="bg-[#1e3a8a] text-white pt-2 pb-1.5 px-3 flex flex-col items-center justify-center border-b-2 border-[#d97706] h-[48px] text-center w-full">
                            <div class="flex items-center justify-center gap-2 w-full">
                                ${moeysLogoSVG}
                                <div class="khmer-moul text-[12.5px] leading-none tracking-wide" style="font-family: 'Moul', serif !important;">សាលាបឋមសិក្សាកំពង់ល្ពៅ</div>
                            </div>
                            <p class="text-[7.5px] uppercase font-bold text-amber-300 tracking-wider leading-none mt-1 text-center w-full">Student Identity Card</p>
                        </div>

                        <div class="flex-1 flex flex-col items-center pt-3 px-3 bg-white">
                            <div class="w-[74px] h-[90px] bg-slate-50 border border-slate-200 rounded-md overflow-hidden shadow-sm mb-2 flex items-center justify-center">
                                <img src="${st.photo}" class="w-full h-full object-cover">
                            </div>

                            <div class="khmer-moul text-[16.5px] text-blue-900 leading-snug mb-2.5 text-center w-full truncate" style="font-family: 'Moul', serif !important;">${st.nameKh}</div>

                            <div class="w-full text-left space-y-1.5 text-[11.5px] text-slate-700 border-t border-slate-100 pt-2.5">
                                <div class="flex"><span class="w-[70px] text-slate-400 font-medium">ភេទ / Sex:</span><span class="font-bold text-slate-900">${st.gender}</span></div>
                                <div class="flex"><span class="w-[70px] text-slate-400 font-medium">ថ្នាក់ / Class:</span><span class="font-bold text-slate-900">${st.studentClass}</span></div>
                                <div class="flex"><span class="w-[70px] text-slate-400 font-medium">អត្តលេខ / ID:</span><span class="font-bold text-amber-600">${st.idNumber}</span></div>
                                <div class="flex"><span class="w-[70px] text-slate-400 font-medium">ថ្ងៃខែឆ្នាំកំ.:</span><span class="font-bold text-slate-900">${st.dob}</span></div>
                                <div class="flex"><span class="w-[70px] text-slate-400 font-medium">ទីកន្លែងបច្ចុ.:</span><span class="font-bold text-slate-900 truncate">${st.address}</span></div>
                            </div>
                        </div>

                        <div class="bg-slate-50 border-t border-slate-100 p-2 px-3 flex justify-between items-center h-[68px]">
                            <div class="flex flex-col items-center justify-center w-[45px]">
                                <div id="qr-node-${i}" class="bg-white p-1 border border-slate-200 rounded shadow-sm flex items-center justify-center"></div>
                                <p class="text-[7px] text-slate-400 font-bold mt-1 text-center whitespace-nowrap tracking-wide">២០២៥-២០២៦</p>
                            </div>
                            
                            <div class="w-[168px] flex flex-col justify-between h-[56px] text-right">
                                <div class="text-[8.5px] font-medium text-slate-400 leading-none block text-center truncate">
                                    ${displayDate}
                                </div>
                                <div class="text-[10.5px] font-bold text-blue-900 leading-none text-center block my-0.5">
                                    គ្រូបន្ទុកថ្នាក់
                                </div>
                                <div class="h-[10px]"></div> 
                                <div class="text-[11.5px] font-bold text-slate-800 text-center border-t border-dashed border-slate-300 pt-1 block truncate uppercase">
                                    ${teacherName}
                                </div>
                            </div>
                        </div>

                    </div>
                `;
                container.innerHTML += cardHtml;
            }

            // បង្កើត QR Code ឡើងវិញជាមួយកម្រិតចាប់យកខ្ពស់ (CorrectLevel.H)
            for(let i=1; i<=6; i++) {
                document.getElementById(`qr-node-${i}`).innerHTML = '';
                new QRCode(document.getElementById(`qr-node-${i}`), {
                    text: cardsData[i].idNumber,
                    width: 30,
                    height: 30,
                    colorDark : "#1e3a8a", 
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }
        }

        function downloadPDFFile() {
            const element = document.getElementById('printPageContainer');
            const btn = document.querySelector('button[onclick="downloadPDFFile()"]');
            btn.innerHTML = "⏳ កំពុងទាញយក...";
            btn.disabled = true;

            const opt = {
                margin:       [4, 4, 4, 4], 
                filename:     'កាតសិស្ស_សាលាកំពង់ល្ពៅ.pdf',
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 4, useCORS: true }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerHTML = "📥 ទាញយកជា PDF";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
