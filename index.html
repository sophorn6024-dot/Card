<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធបង្កើតកាតសិស្សម្ដង ៦នាក់ - សាលាបឋមសិក្សាកំពង់ល្ពៅ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Khmer&family=Moul&display=swap');
        body { font-family: 'Khmer', sans-serif; }
        .khmer-moul { font-family: 'Moul', serif; }
        
        /* ការកំណត់ទំហំឱ្យត្រូវស្តង់ដាក្រដាស A4 ពេលបោះពុម្ព */
        @page {
            size: A4 portrait;
            margin: 10mm;
        }
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .print-page { 
                display: grid !important; 
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 12px !important;
                width: 100% !important;
                box-shadow: none !important;
                padding: 0 !important;
            }
            .card-item {
                box-shadow: none !important;
                border: 1px solid #d1d5db !important;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-100 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 no-print">
            <div class="bg-white p-6 rounded-2xl shadow-xl border border-amber-200 lg:col-span-1">
                <h2 class="text-xl font-bold text-amber-600 mb-4 border-b pb-2 flex items-center gap-2">
                    🏫 បញ្ចូលព័ត៌មានសិស្ស (ម្នាក់ៗ)
                </h2>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">ឈ្មោះសាលារៀន</label>
                        <input type="text" id="schoolInput" value="សាលាបឋមសិក្សាកំពង់ល្ពៅ" class="w-full p-2 border text-sm rounded-lg outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">ឈ្មោះសិស្ស (ខ្មែរ)</label>
                        <input type="text" id="nameKhInput" placeholder="ឧ. សុខ ណារី" class="w-full p-2 border text-sm rounded-lg outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">ឈ្មោះសិស្ស (ឡាតាំង)</label>
                        <input type="text" id="nameEnInput" placeholder="ឧ. SOK NARY" class="w-full p-2 border text-sm rounded-lg outline-none focus:ring-2 focus:ring-amber-500 uppercase">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">ភេទ</label>
                            <select id="genderInput" class="w-full p-2 border text-sm rounded-lg outline-none focus:ring-2 focus:ring-amber-500">
                                <option value="ប្រុស">ប្រុស</option>
                                <option value="ស្រី">ស្រី</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">ថ្នាក់ទី</label>
                            <input type="text" id="classInput" placeholder="ឧ. 4A" class="w-full p-2 border text-sm rounded-lg outline-none focus:ring-2 focus:ring-amber-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">អត្តលេខសិស្ស (ID)</label>
                        <input type="text" id="idInput" placeholder="ឧ. KLP-2026-001" class="w-full p-2 border text-sm rounded-lg outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">ជ្រើសរើសរូបថត</label>
                        <input type="file" id="photoInput" accept="image/*" class="w-full p-1 border text-xs rounded-lg bg-gray-50">
                    </div>
                    
                    <button onclick="addStudentToList()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 px-4 rounded-lg transition shadow-md mt-2">
                        ➕ បន្ថែមទៅក្នុងបញ្ជី (Add to List)
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-200 lg:col-span-2 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h2 class="text-xl font-bold text-gray-700 flex items-center gap-2">
                            📋 បញ្ជីឈ្មោះសិស្សកាត (អតិបរមា ៦ នាក់)
                        </h2>
                        <span id="studentCount" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">បានបញ្ចូល: 0/6 នាក់</span>
                    </div>
                    
                    <div class="overflow-x-auto max-h-[280px]">
                        <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                                <tr>
                                    <th class="px-4 py-2">អត្តលេខ</th>
                                    <th class="px-4 py-2">ឈ្មោះខ្មែរ</th>
                                    <th class="px-4 py-2">ឈ្មោះឡាតាំង</th>
                                    <th class="px-4 py-2">ភេទ</th>
                                    <th class="px-4 py-2">ថ្នាក់</th>
                                    <th class="px-4 py-2 text-center">សកម្មភាព</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="flex gap-4 mt-4">
                    <button onclick="clearAllStudents()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2.5 px-4 rounded-lg transition">
                        🗑️ លុបទាំងអស់
                    </button>
                    <button onclick="window.print()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-4 rounded-lg transition flex items-center justify-center gap-2 shadow-md">
                        🖨️ បោះពុម្ព ឬសេវជា PDF ទំព័រ A4
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-[1000px] mx-auto border border-gray-300">
            <p class="text-center text-xs text-gray-400 mb-4 no-print">--- ទម្រង់មើលមុនពេលបោះពុម្ពលើក្រដាស A4 (Preview) ---</p>
            
            <div id="printPageContainer" class="print-page grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 justify-items-center">
                <div class="col-span-full text-center py-12 text-gray-400 no-print">
                     សូមបំពេញព័ត៌មានខាងលើ រួចចុច "បន្ថែមទៅក្នុងបញ្ជី" ដើម្បីបង្ហាញកាតសិស្សនៅត្រង់នេះ។
                </div>
            </div>
        </div>

    </div>

    <script>
        let studentsList = [];
        const defaultPhoto = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%23cbd5e1' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";

        // អនុគមន៍បន្ថែមសិស្សចូលក្នុងបញ្ជី (អតិបរមា៦)
        function addStudentToList() {
            if (studentsList.length >= 6) {
                alert("អ្នកអាចបង្កើតកាតបានអតិបរមាត្រឹមតែ ៦ នាក់ប៉ុណ្ណោះក្នុងមួយសន្លឹក A4!");
                return;
            }

            const school = document.getElementById('schoolInput').value;
            const nameKh = document.getElementById('nameKhInput').value;
            const nameEn = document.getElementById('nameEnInput').value;
            const gender = document.getElementById('genderInput').value;
            const studentClass = document.getElementById('classInput').value;
            const idNumber = document.getElementById('idInput').value;
            const photoInput = document.getElementById('photoInput');

            if (!nameKh || !idNumber) {
                alert("សូមបំពេញឈ្មោះសិស្ស និងអត្តលេខសិស្សជាដាច់ខាត!");
                return;
            }

            const student = {
                id: Date.now(),
                school: school || "សាលាបឋមសិក្សាកំពង់ល្ពៅ",
                nameKh: nameKh,
                nameEn: nameEn.toUpperCase() || "STUDENT NAME",
                gender: gender,
                studentClass: studentClass || "-",
                idNumber: idNumber,
                photo: defaultPhoto
            };

            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    student.photo = e.target.result;
                    studentsList.push(student);
                    renderSystem();
                }
                reader.readAsDataURL(photoInput.files[0]);
            } else {
                studentsList.push(student);
                renderSystem();
            }

            // សម្អាត Form បន្ទាប់ពីបញ្ចូលរួច ដើម្បីងាយបំពេញម្នាក់ទៀត
            document.getElementById('nameKhInput').value = '';
            document.getElementById('nameEnInput').value = '';
            document.getElementById('classInput').value = '';
            document.getElementById('idInput').value = '';
            document.getElementById('photoInput').value = '';
        }

        // អនុគមន៍លុបសិស្សម្នាក់ចេញ
        function deleteStudent(id) {
            studentsList = studentsList.filter(item => item.id !== id);
            renderSystem();
        }

        // លុបទាំងអស់
        function clearAllStudents() {
            studentsList = [];
            renderSystem();
        }

        // អនុគមន៍បង្ហាញទិន្នន័យលើអេក្រង់ឡើងវិញ (Render Table & Cards)
        function renderSystem() {
            // ធ្វើបច្ចុប្បន្នភាពចំនួនសិស្ស
            document.getElementById('studentCount').innerText = `បានបញ្ចូល: ${studentsList.length}/6 នាក់`;

            // បង្ហាញក្នុងតារាងបញ្ជីឈ្មោះ
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '';
            studentsList.forEach(st => {
                tbody.innerHTML += `
                    <tr class="bg-white border-b hover:bg-gray-50 text-xs">
                        <td class="px-4 py-2 font-medium text-gray-900">${st.idNumber}</td>
                        <td class="px-4 py-2">${st.nameKh}</td>
                        <td class="px-4 py-2">${st.nameEn}</td>
                        <td class="px-4 py-2">${st.gender}</td>
                        <td class="px-4 py-2">${st.studentClass}</td>
                        <td class="px-4 py-2 text-center">
                            <button onclick="deleteStudent(${st.id})" class="text-red-600 hover:underline">លុប</button>
                        </td>
                    </tr>
                `;
            });

            // បង្កើតកាតសិស្សក្នុងក្រដាស A4
            const cardContainer = document.getElementById('printPageContainer');
            cardContainer.innerHTML = '';

            if (studentsList.length === 0) {
                cardContainer.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400 no-print">សូមបំពេញព័ត៌មានខាងលើ រួចចុច "បន្ថែមទៅក្នុងបញ្ជី" ដើម្បីបង្ហាញកាតសិស្សនៅត្រង់នេះ។</div>`;
                return;
            }

            studentsList.forEach((st, index) => {
                const cardHtml = `
                    <div class="card-item w-[225px] h-[350px] bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 relative flex flex-col justify-between text-center text-xs">
                        <div class="bg-gradient-to-r from-amber-500 to-orange-500 text-white p-2.5 relative">
                            <h3 class="khmer-moul text-[8.5px] leading-tight">${st.school}</h3>
                            <p class="text-[7.5px] uppercase font-semibold text-amber-100 tracking-wider">Student ID Card</p>
                        </div>
                        <div class="flex-1 flex flex-col items-center pt-3 px-3">
                            <div class="w-18 h-24 bg-gray-50 border-2 border-amber-100 rounded shadow-sm mb-2 overflow-hidden flex items-center justify-center">
                                <img src="${st.photo}" class="w-full h-full object-cover">
                            </div>
                            <h2 class="text-sm font-bold text-gray-800 mb-0.5">${st.nameKh}</h2>
                            <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-tight mb-2">${st.nameEn}</p>
                            <div class="w-full text-left space-y-1 text-gray-600 border-t pt-2 text-[11px]">
                                <div class="flex"><span class="w-14 text-gray-400">ភេទ / Sex:</span><span class="font-semibold">${st.gender}</span></div>
                                <div class="flex"><span class="w-14 text-gray-400">ថ្នាក់ទី / Class:</span><span class="font-semibold">${st.studentClass}</span></div>
                                <div class="flex"><span class="w-14 text-gray-400">អត្តលេខ / ID:</span><span class="font-semibold text-orange-600">${st.idNumber}</span></div>
                            </div>
                        </div>
                        <div class="bg-amber-50 border-t border-amber-100 p-2 flex items-center justify-between px-3">
                            <div class="text-left">
                                <p class="text-[7px] text-gray-400">ឆ្នាំសិក្សា</p>
                                <p class="text-[9px] font-bold text-gray-700">2025-2026</p>
                            </div>
                            <div id="qr-${index}" class="bg-white p-0.5 border border-amber-200 rounded"></div>
                        </div>
                    </div>
                `;
                
                cardContainer.innerHTML += cardHtml;
            });

            // បង្កើត QR Code សម្រាប់កាតនីមួយៗបន្ទាប់ពី Render រួច
            studentsList.forEach((st, index) => {
                new QRCode(document.getElementById(`qr-${index}`), {
                    text: st.idNumber,
                    width: 38,
                    height: 38,
                    colorDark : "#d97706",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            });
        }
    </script>
</body>
</html>
