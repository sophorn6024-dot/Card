<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធបង្កើតកាតសិស្សបញ្ឈរ (7.15cm x 9.25cm) - សាលាបឋមសិក្សាកំពង់ល្ពៅ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Khmer&family=Moul&display=swap');
        body { font-family: 'Khmer', sans-serif; }
        .khmer-moul { font-family: 'Moul', serif; }
        
        /* កំណត់ទំហំក្រដាស A4 ជាទម្រង់ផ្ដេក (Landscape) ពេលបោះពុម្ព */
        @page {
            size: A4 landscape;
            margin: 0mm; 
        }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            
            /* រៀបចំផ្ទៃបោះពុម្ព A4 ផ្ដេកឱ្យសមល្មមពិតប្រាកដ */
            .print-container {
                box-shadow: none !important;
                border: none !important;
                padding: 12mm 14mm !important;
                background: white !important;
                width: 29.7cm !important;
                height: 21.0cm !important;
                box-sizing: border-box;
            }
            
            .print-page { 
                display: grid !important; 
                grid-template-columns: repeat(3, 7.15cm) !important; /* កំណត់ទទឹងកាតបញ្ឈរ 7.15cm ចំនួន៣ */
                gap: 6mm 10mm !important; /* ចន្លោះរវាងកាតដេក និងឈរ */
                width: 100% !important;
                justify-content: center !important;
            }
            .card-item {
                box-shadow: none !important;
                border: 0.5px solid #94a3b8 !important; /* បន្ទាត់ស្តើងសម្រាប់កាត់ */
                page-break-inside: avoid;
                width: 7.15cm !important;  /* ទទឹងបញ្ឈរ */
                height: 9.25cm !important; /* កម្ពស់បញ្ឈរ */
            }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 no-print">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-4 mb-4 gap-4">
                <div>
                    <h2 class="text-xl font-bold text-amber-600 flex items-center gap-2">
                        🏫 ប្រព័ន្ធកាតសិស្សទម្រង់បញ្ឈរ (7.15cm * 9.25cm) លើក្រដាស A4 ផ្ដេក
                    </h2>
                    <p class="text-xs text-slate-400 mt-1">ចុចជ្រើសរើស "កាតទី..." ដើម្បីប្តូរការបញ្ចូលព័ត៌មានទៅតាមកាតនីមួយៗ</p>
                </div>
                <button onclick="window.print()" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-6 rounded-xl transition flex items-center justify-center gap-2 shadow-md">
                    🖨️ បោះពុម្ព ឬរក្សាទុកជា PDF (A4 ផ្ដេក)
                </button>
            </div>

            <div class="flex flex-wrap gap-2 mb-6 bg-slate-50 p-2 rounded-xl border border-slate-200">
                <button onclick="selectCard(1)" id="btnCard1" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-amber-500 text-white shadow">កាតទី ១</button>
                <button onclick="selectCard(2)" id="btnCard2" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ២</button>
                <button onclick="selectCard(3)" id="btnCard3" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៣</button>
                <button onclick="selectCard(4)" id="btnCard4" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៤</button>
                <button onclick="selectCard(5)" id="btnCard5" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៥</button>
                <button onclick="selectCard(6)" id="btnCard6" class="flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200">កាតទី ៦</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ឈ្មោះសិស្ស (ភាសាខ្មែរ)</label>
                    <input type="text" id="inputNameKh" oninput="updateData()" placeholder="ឧ. សុខ ណារី" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ឈ្មោះសិស្ស (ឡាតាំង)</label>
                    <input type="text" id="inputNameEn" oninput="updateData()" placeholder="ឧ. SOK NARY" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 uppercase bg-slate-50">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">ភេទ</label>
                        <select id="inputGender" onchange="updateData()" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 bg-slate-50">
                            <option value="ប្រុស">ប្រុស</option>
                            <option value="ស្រី">ស្រី</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">ថ្នាក់ទី</label>
                        <input type="text" id="inputClass" oninput="updateData()" placeholder="ឧ. 4A" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 bg-slate-50">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">អត្តលេខសិស្ស (ID)</label>
                    <input type="text" id="inputID" oninput="updateData()" placeholder="ឧ. KLP-001" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ថ្ងៃខែឆ្នាំកំណើត</label>
                    <input type="text" id="inputDob" oninput="updateData()" placeholder="ឧ. ១៥/០២/២០១៥" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">ទីកន្លែងបច្ចុប្បន្ន (អាសយដ្ឋាន)</label>
                    <input type="text" id="inputAddress" oninput="updateData()" placeholder="ឧ. ភូមិកំពង់ល្ពៅ" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:border-amber-500 bg-slate-50">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-500 mb-1">ជ្រើសរើសរូបថតសិស្ស</label>
                    <input type="file" id="inputPhoto" onchange="updatePhoto(this)" accept="image/*" class="w-full p-1.5 border border-slate-300 rounded-lg bg-slate-50 text-xs">
                </div>
            </div>
        </div>

        <div id="a4Wrapper" class="print-container bg-white p-6 rounded-2xl shadow-xl border border-slate-300 max-w-[960px] mx-auto overflow-x-auto">
            <p class="text-center text-xs text-slate-400 mb-4 no-print">--- ទម្រង់មើលមុនពេលបោះពុម្ពលើក្រដាស A4 ផ្ដេក (កាតបញ្ឈរ៖ 7.15cm * 9.25cm) ---</p>
            
            <div id="printPageContainer" class="print-page flex flex-wrap gap-4 justify-center w-full mx-auto">
                </div>
        </div>

    </div>

    <script>
        let currentCardIndex = 1;
        const defaultPhoto = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%23cbd5e1' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";
        
        let cardsData = {};
        for(let i=1; i<=6; i++) {
            cardsData[i] = {
                nameKh: `សិស្សទី ${i}`,
                nameEn: `STUDENT NAME 0${i}`,
                gender: "ប្រុស",
                studentClass: "4A",
                idNumber: `KLP-2026-00${i}`,
                dob: "១៥/០២/២០១៥",
                address: "ភូមិកំពង់ល្ពៅ",
                photo: defaultPhoto
            };
        }

        window.onload = function() {
            renderAllCards();
            loadFormData();
        };

        function selectCard(index) {
            currentCardIndex = index;
            for(let i=1; i<=6; i++) {
                const btn = document.getElementById(`btnCard${i}`);
                if(i === index) {
                    btn.className = "flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-amber-500 text-white shadow";
                } else {
                    btn.className = "flex-1 min-w-[80px] py-2 px-3 rounded-lg font-bold text-sm transition bg-white text-slate-600 hover:bg-slate-200";
                }
            }
            loadFormData();
        }

        function loadFormData() {
            const data = cardsData[currentCardIndex];
            document.getElementById('inputNameKh').value = data.nameKh.includes("សិស្សទី") ? "" : data.nameKh;
            document.getElementById('inputNameEn').value = data.nameEn.includes("STUDENT") ? "" : data.nameEn;
            document.getElementById('inputGender').value = data.gender;
            document.getElementById('inputClass').value = data.studentClass;
            document.getElementById('inputID').value = data.idNumber;
            document.getElementById('inputDob').value = data.dob.includes("១៥/០២") ? "" : data.dob;
            document.getElementById('inputAddress').value = data.address.includes("ភូមិកំពង់") ? "" : data.address;
            document.getElementById('inputPhoto').value = "";
        }

        function updateData() {
            const index = currentCardIndex;
            cardsData[index].nameKh = document.getElementById('inputNameKh').value || `សិស្សទី ${index}`;
            cardsData[index].nameEn = document.getElementById('inputNameEn').value.toUpperCase() || `STUDENT NAME 0${index}`;
            cardsData[index].gender = document.getElementById('inputGender').value;
            cardsData[index].studentClass = document.getElementById('inputClass').value || "-";
            cardsData[index].idNumber = document.getElementById('inputID').value || `KLP-00${index}`;
            cardsData[index].dob = document.getElementById('inputDob').value || "xx/xx/xxxx";
            cardsData[index].address = document.getElementById('inputAddress').value || "-";
            
            renderAllCards();
        }

        function updatePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    cardsData[currentCardIndex].photo = e.target.result;
                    renderAllCards();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderAllCards() {
            const container = document.getElementById('printPageContainer');
            container.innerHTML = '';

            for(let i=1; i<=6; i++) {
                const st = cardsData[i];
                const cardHtml = `
                    <div class="card-item w-[7.15cm] h-[9.25cm] bg-white rounded-xl shadow-md overflow-hidden relative flex flex-col justify-between text-center box-border border border-slate-200">
                        
                        <div class="bg-gradient-to-r from-amber-500 to-orange-500 text-white pt-2.5 pb-2 px-2 text-center border-b border-orange-400">
                            <h3 class="khmer-moul text-[8.5px] tracking-wide leading-tight">សាលាបឋមសិក្សាកំពង់ល្ពៅ</h3>
                            <p class="text-[7px] uppercase font-bold text-amber-100 tracking-widest mt-0.5">Student Identity Card</p>
                        </div>

                        <div class="flex-1 flex flex-col items-center pt-3 px-3 bg-gradient-to-b from-white to-amber-50/10">
                            <div class="w-[72px] h-[92px] bg-slate-50 border-4 border-amber-100 rounded-lg overflow-hidden shadow-sm mb-2 flex items-center justify-center">
                                <img src="${st.photo}" class="w-full h-full object-cover">
                            </div>

                            <h2 class="text-[13px] font-black text-slate-800 leading-tight mb-0.5">${st.nameKh}</h2>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tight mb-2.5 leading-none">${st.nameEn}</p>

                            <div class="w-full text-left space-y-1 text-[10.5px] text-slate-600 border-t border-slate-100 pt-2">
                                <div class="flex"><span class="w-[65px] text-slate-400 font-medium">ភេទ / Sex:</span><span class="font-bold text-slate-700">${st.gender}</span></div>
                                <div class="flex"><span class="w-[65px] text-slate-400 font-medium">ថ្នាក់ / Class:</span><span class="font-bold text-slate-700">${st.studentClass}</span></div>
                                <div class="flex"><span class="w-[65px] text-slate-400 font-medium">អត្តលេខ / ID:</span><span class="font-bold text-orange-600">${st.idNumber}</span></div>
                                <div class="flex"><span class="w-[65px] text-slate-400 font-medium">ថ្ងៃខែឆ្នាំកំ.:</span><span class="font-bold text-slate-700 text-[10px]">${st.dob}</span></div>
                                <div class="flex"><span class="w-[65px] text-slate-400 font-medium">ទីកន្លែងបច្ចុ.:</span><span class="font-bold text-slate-700 truncate text-[10px]" title="${st.address}">${st.address}</span></div>
                            </div>
                        </div>

                        <div class="bg-slate-50 border-t border-slate-100 p-2 px-3 flex justify-between items-center">
                            <div id="qr-node-${i}" class="bg-white p-0.5 border border-slate-200 rounded shadow-sm"></div>
                            
                            <div class="text-right select-none">
                                <p class="text-[7.5px] font-bold text-slate-500 leading-none">ហត្ថលេខាគ្រូ</p>
                                <div class="h-6"></div> <p class="text-[6px] text-slate-400 border-t border-dashed border-slate-300 pt-0.5 w-16 text-center ml-auto">កាលបរិច្ឆេទ</p>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            }

            // បង្កើត QR Code ដាក់ចូលកាតនីមួយៗ
            for(let i=1; i<=6; i++) {
                new QRCode(document.getElementById(`qr-node-${i}`), {
                    text: cardsData[i].idNumber,
                    width: 28,
                    height: 28,
                    colorDark : "#d97706",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }
        }
    </script>
</body>
</html>
